<main>
  <div id="account_panel" class="centered">
    <div id="account_panel_info">
      <h1 class="account_panel_title"> Welcome to Relay </h1>

    </div>
    <div id="account_panel_login">
      <h2>Login</h2>
      <form id="account_panel_form">
        <input type="email" id="account_identifier" class="account_form_input" placeholder="email / username"/>
        <input type="password" id="account_password" class="account_form_input" placeholder="password"/>
        <input type="submit" id="account_form_submit" value="Login" (click)="onLogin($event)"/>
      </form>
      <div class="account_create_button" (click)="loadCreateAccount()">Create Account</div>
    </div>
  </div>
  <div id="error_message_panel">Error message</div>
</main>
